name: Preview Docs Builds

# When a new udpate is made to this PR, cancel any still-running builds from previous pushes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/docs*'
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:
    

jobs:
  build-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
           pip install .[docs]

      - name: Build and deploy mkdocs
        run: |
          mkdocs build --config-file docs/mkdocs.yml --site-dir ./site -v

      - name: Upload a Build Artifact
        id: upload
        uses: actions/upload-artifact@v7.0.1
        with:
          path: docs/site
          if-no-files-found: error
          retention-days: 15
          compression-level: 0
          include-hidden-files: true

      - name: Add PR Comment
        uses: mshick/add-pr-comment@v3.11.0
        with:
          message: |
            Documentation preview published at https://html-preview.github.io/?url=${{ steps.upload.outputs.artifact-url }} :disguised_face:
          
